name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t doordash-api .

      - name: Run container
        run: docker run -d --name doordash-test -p 8090:8090 doordash-api

      - name: Wait for container to be ready
        run: curl --retry 30 --retry-delay 2 --retry-all-errors --fail -s http://localhost:8090/status/

      - name: Install test dependencies
        run: pip install pytest httpx

      - name: Run tests
        run: pytest -v

      - name: Cleanup
        if: always()
        run: docker rm -f doordash-test || true
