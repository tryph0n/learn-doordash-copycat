name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t doordash-api .

      - name: Run container
        run: docker run -d --name doordash-test -p 8090:8090 doordash-api

      - name: Wait for container to be ready
        run: curl --retry 30 --retry-delay 2 --retry-connrefused --fail -s http://localhost:8090/status/

      - name: Test GET /
        run: curl --fail -s http://localhost:8090/

      - name: Test POST /calculate-fee/
        run: |
          curl --fail -s -X POST -H "Content-Type: application/json" \
            -d '{"distance_km": 5.0, "weight_kg": 2.0}' \
            http://localhost:8090/calculate-fee/

      - name: Test GET /estimate-time/
        run: curl --fail -s http://localhost:8090/estimate-time/5.0

      - name: Test GET /status/
        run: curl --fail -s http://localhost:8090/status/

      - name: Cleanup
        if: always()
        run: docker rm -f doordash-test || true
